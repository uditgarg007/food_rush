<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Menu — FoodRush</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .menu-manage-card {
      background: white; border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); position: relative; transition: all var(--t);
    }
    .menu-manage-card:hover { box-shadow: var(--shadow-md); }
    .menu-manage-card.unavailable { opacity: 0.6; }
    .item-img { width: 100%; height: 160px; object-fit: cover; }
    .item-img-placeholder { width: 100%; height: 160px; background: linear-gradient(135deg,var(--gray-5),var(--gray-4)); display: grid; place-items: center; font-size: 3rem; }
    .item-body { padding: 14px; }
    .item-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
    .item-action-btn { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-size: 0.9rem; cursor: pointer; border: none; transition: all var(--t); box-shadow: var(--shadow-xs); }
    .item-action-btn.edit   { background: white; }
    .item-action-btn.delete { background: #fce4ec; color: var(--primary); }
    .item-action-btn:hover  { transform: scale(1.1); }
    .avail-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 3px 10px; border-radius: var(--radius-full); font-size: 0.72rem; font-weight: 700;
    }
    .avail-badge.available   { background: rgba(61,155,61,0.9); color: white; }
    .avail-badge.unavailable { background: rgba(100,100,100,0.85); color: white; }
    .cat-section-title { font-size: 1.1rem; font-weight: 700; margin: 28px 0 14px; padding-bottom: 10px; border-bottom: 2px solid var(--gray-5); display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/restaurant/dashboard.html" class="navbar-logo"><div class="logo-icon">🍱</div>Food<span>Rush</span></a>
    <div class="navbar-nav">
      <a href="/restaurant/dashboard.html" class="nav-link">📋 Orders</a>
      <a href="/restaurant/menu.html" class="nav-link active">🍔 Menu</a>
      <a href="/restaurant/profile.html" class="nav-link">⚙️ Profile</a>
    </div>
    <div class="navbar-right">
      <button class="btn btn-ghost btn-sm" data-action="logout">Logout</button>
    </div>
  </div>
</nav>

<div class="page-body">
  <div class="container">
    <div class="flex-between mb-24">
      <h1>Manage Menu</h1>
      <div class="flex gap-12">
        <span id="item-count" style="color:var(--gray-3);font-size:0.85rem;align-self:center;"></span>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Item</button>
      </div>
    </div>

    <div id="menu-container">
      <div style="text-align:center;padding:60px;"><div class="spinner" style="margin:auto;"></div></div>
    </div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay hidden" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Menu Item</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-item-id"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Item Name *</label>
          <input id="item-name" type="text" class="form-control" placeholder="Butter Chicken"/>
        </div>
        <div class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input id="item-price" type="number" class="form-control" placeholder="299" min="0"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="item-desc" class="form-control" rows="2" placeholder="Creamy tomato-based gravy with tender chicken…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="item-category" class="form-control form-select">
            <option value="">Select category</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="item-veg" class="form-control form-select">
            <option value="0">🔴 Non-Veg</option>
            <option value="1">🟢 Veg</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input id="item-img" type="url" class="form-control" placeholder="https://images.unsplash.com/…" oninput="previewImg()"/>
        <img id="img-preview" class="img-preview" src="" alt="Preview"/>
      </div>
      <div id="modal-error" style="color:var(--primary);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-primary" style="width:100%;padding:13px;" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header"><h3>Delete Item</h3><button class="modal-close" onclick="closeDeleteModal()">✕</button></div>
    <div class="modal-body">
      <p>Are you sure you want to delete <strong id="delete-item-name"></strong>? This cannot be undone.</p>
      <div style="display:flex;gap:12px;margin-top:24px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" style="flex:1;" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="Add menu item">+</button>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  let restaurantId, categories = [], menuData = {}, deleteTarget = null;

  async function init() {
    await requireAuth(['restaurant_owner']);
    const rest = await API.restaurants.my();
    if (!rest) { toast('Create your restaurant profile first', 'error'); return; }
    restaurantId = rest.id;
    categories = await API.categories.list();
    populateCategorySelect();
    await loadMenu();
  }

  function populateCategorySelect() {
    const sel = document.getElementById('item-category');
    categories.forEach(c => { const opt = document.createElement('option'); opt.value = c.id; opt.textContent = c.icon + ' ' + c.name; sel.appendChild(opt); });
  }

  async function loadMenu() {
    const container = document.getElementById('menu-container');
    try {
      const { menu } = await API.restaurants.get(restaurantId);
      menuData = menu;
      const cats = Object.keys(menu);
      const totalItems = cats.reduce((s, k) => s + menu[k].items.length, 0);
      document.getElementById('item-count').textContent = totalItems + ' items';

      if (!totalItems) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍔</div><h3>No menu items yet</h3><p>Add your first item to start taking orders!</p></div>`;
        return;
      }

      container.innerHTML = cats.map(cat => `
        <div class="cat-section-title">${menu[cat].icon} ${cat}</div>
        <div class="menu-grid">
          ${menu[cat].items.map(item => `
            <div class="menu-manage-card ${!item.is_available ? 'unavailable' : ''}" id="item-card-${item.id}">
              ${item.image_url
                ? `<img class="item-img" src="${item.image_url}" alt="${item.name}" loading="lazy"/>`
                : `<div class="item-img-placeholder">🍽️</div>`}
              <span class="avail-badge ${item.is_available ? 'available' : 'unavailable'}">${item.is_available ? '● Available' : '● Hidden'}</span>
              <div class="item-actions">
                <button class="item-action-btn edit" onclick="openEditModal(${JSON.stringify(item).split('"').join('&quot;')})" title="Edit">✏️</button>
                <button class="item-action-btn delete" onclick="openDeleteModal(${item.id},'${item.name.replace(/'/g,"\\'")}')">🗑️</button>
              </div>
              <div class="item-body">
                <div class="flex gap-8 mb-4">
                  <div class="veg-indicator ${item.is_veg ? 'veg' : 'non-veg'}"></div>
                  <div style="font-weight:700;font-size:0.95rem;">${item.name}</div>
                </div>
                <div style="font-size:0.8rem;color:var(--gray-3);margin-bottom:8px;">${item.description || ''}</div>
                <div class="flex-between">
                  <span style="font-weight:800;color:var(--primary);">₹${parseFloat(item.price).toFixed(0)}</span>
                  <button class="btn btn-sm ${item.is_available ? 'btn-ghost' : 'btn-success'}" onclick="toggleItem(${item.id})">
                    ${item.is_available ? 'Hide' : 'Show'}
                  </button>
                </div>
              </div>
            </div>`).join('')}
        </div>`).join('');
    } catch (err) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Menu Item';
    document.getElementById('edit-item-id').value = '';
    ['item-name','item-price','item-desc','item-img'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('item-veg').value = '0';
    document.getElementById('item-category').value = '';
    document.getElementById('img-preview').classList.remove('visible');
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('item-modal').classList.remove('hidden');
  }

  function openEditModal(item) {
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('edit-item-id').value    = item.id;
    document.getElementById('item-name').value        = item.name;
    document.getElementById('item-price').value       = item.price;
    document.getElementById('item-desc').value        = item.description || '';
    document.getElementById('item-img').value         = item.image_url || '';
    document.getElementById('item-veg').value         = item.is_veg ? '1' : '0';
    document.getElementById('item-category').value    = item.category_id || '';
    previewImg();
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('item-modal').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }

  async function saveItem() {
    const id    = document.getElementById('edit-item-id').value;
    const name  = document.getElementById('item-name').value.trim();
    const price = parseFloat(document.getElementById('item-price').value);
    if (!name || isNaN(price)) { showModalError('Name and price are required'); return; }

    const data = {
      name, price,
      description:  document.getElementById('item-desc').value.trim() || undefined,
      image_url:    document.getElementById('item-img').value.trim() || undefined,
      is_veg:       document.getElementById('item-veg').value === '1',
      category_id:  document.getElementById('item-category').value || undefined,
    };

    try {
      if (id) await API.restaurants.updateItem(restaurantId, id, data);
      else    await API.restaurants.addItem(restaurantId, data);
      closeModal();
      toast(id ? 'Item updated!' : 'Item added! 🎉', 'success');
      loadMenu();
    } catch (err) { showModalError(err.message); }
  }

  function showModalError(msg) {
    const el = document.getElementById('modal-error');
    el.textContent = msg; el.style.display = '';
  }

  function openDeleteModal(id, name) {
    deleteTarget = id;
    document.getElementById('delete-item-name').textContent = name;
    document.getElementById('delete-modal').classList.remove('hidden');
  }

  function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); deleteTarget = null; }

  async function confirmDelete() {
    if (!deleteTarget) return;
    try {
      await API.restaurants.deleteItem(restaurantId, deleteTarget);
      toast('Item deleted', 'info');
      closeDeleteModal();
      loadMenu();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function toggleItem(itemId) {
    try {
      await API.restaurants.toggleItem(restaurantId, itemId);
      loadMenu();
    } catch (err) { toast(err.message, 'error'); }
  }

  function previewImg() {
    const url = document.getElementById('item-img').value.trim();
    const prev = document.getElementById('img-preview');
    if (url) { prev.src = url; prev.classList.add('visible'); }
    else { prev.classList.remove('visible'); }
  }

  init();
</script>
</body>
</html>
