<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — FoodRush</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .order-detail { display: none; padding: 16px; background: var(--bg); border-radius: var(--radius-sm); margin-top: 12px; }
    .order-detail.open { display: block; }
    .order-item-row { display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:0.9rem;border-bottom:1px solid var(--gray-5); }
    .order-item-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/customer/dashboard.html" class="navbar-logo"><div class="logo-icon">🍱</div>Food<span>Rush</span></a>
    <div class="navbar-right">
      <a href="/customer/dashboard.html" class="btn btn-primary btn-sm">+ Order More</a>
      <button class="btn btn-ghost btn-sm" data-action="logout">Logout</button>
    </div>
  </div>
</nav>

<div class="page-body">
  <div class="container" style="max-width:820px;">
    <div class="flex-between mb-24">
      <h1>My Orders</h1>
      <div style="font-size:0.85rem;color:var(--gray-3);" id="order-count"></div>
    </div>

    <!-- Status Filter -->
    <div class="tabs mb-24" id="status-tabs">
      <button class="tab-btn active" onclick="filterStatus(this,'')">All</button>
      <button class="tab-btn" onclick="filterStatus(this,'placed')">Active</button>
      <button class="tab-btn" onclick="filterStatus(this,'delivered')">Delivered</button>
    </div>

    <div id="orders-container">
      <div style="text-align:center;padding:60px;"><div class="spinner" style="margin:auto;"></div></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  let allOrders = [], currentFilter = '';
  let pollInterval;

  const STATUS_STEPS = ['placed','accepted','preparing','ready','out_for_delivery','delivered'];

  async function init() {
    await requireAuth(['customer']);
    await loadOrders();

    // Highlight from URL
    const params = new URLSearchParams(window.location.search);
    const hid = params.get('highlight');
    if (hid) setTimeout(() => { const el = document.getElementById('order-'+hid); if (el) { el.scrollIntoView({behavior:'smooth'}); el.style.boxShadow='0 0 0 3px var(--primary)'; setTimeout(()=>el.style.boxShadow='',3000); } }, 500);

    // Poll active orders every 15s
    pollInterval = setInterval(pollActive, 15000);
  }

  async function loadOrders() {
    try {
      allOrders = await API.orders.list();
      renderOrders();
    } catch (err) {
      document.getElementById('orders-container').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }

  async function pollActive() {
    try {
      const fresh = await API.orders.list();
      const active = ['placed','accepted','preparing','ready','out_for_delivery'];
      const hasActive = allOrders.some(o => active.includes(o.status));
      if (hasActive) { allOrders = fresh; renderOrders(); }
      else { clearInterval(pollInterval); }
    } catch {}
  }

  function renderOrders() {
    let orders = allOrders;
    if (currentFilter === 'placed') {
      const active = ['placed','accepted','preparing','ready','out_for_delivery'];
      orders = orders.filter(o => active.includes(o.status));
    } else if (currentFilter === 'delivered') {
      orders = orders.filter(o => o.status === 'delivered');
    }
    document.getElementById('order-count').textContent = `${orders.length} order${orders.length!==1?'s':''}`;

    if (!orders.length) {
      document.getElementById('orders-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>No orders yet</h3>
          <p>Order something delicious from our restaurants!</p>
          <a href="/customer/dashboard.html" class="btn btn-primary mt-16">Browse Restaurants</a>
        </div>`;
      return;
    }

    document.getElementById('orders-container').innerHTML = orders.map(o => `
      <div class="order-card fade-in mb-16" id="order-${o.id}" onclick="toggleOrder(${o.id})">
        <div class="order-card-header">
          <div>
            <div class="order-id">Order #${o.id} · ${formatDate(o.created_at)}</div>
            <div class="order-restaurant">${o.restaurant_name || 'Restaurant'}</div>
            <div class="order-meta">₹${parseFloat(o.total_amount).toFixed(0)} · ${timeAgo(o.created_at)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
            ${statusBadgeHtml(o.status)}
            <span style="color:var(--gray-3);font-size:0.8rem;">▼ Details</span>
          </div>
        </div>

        <!-- Status tracker -->
        ${o.status !== 'cancelled' ? `
        <div class="status-tracker" style="margin-top:16px;">
          ${STATUS_STEPS.map((s, i) => {
            const idx = STATUS_STEPS.indexOf(o.status);
            const cls = i < idx ? 'done' : (i === idx ? (o.status === 'delivered' ? 'done' : 'active') : '');
            const icons = { placed:'🕐', accepted:'✅', preparing:'👨‍🍳', ready:'📦', out_for_delivery:'🛵', delivered:'🏠' };
            const labels = { placed:'Placed', accepted:'Accepted', preparing:'Preparing', ready:'Ready', out_for_delivery:'On the way', delivered:'Delivered' };
            return `<div class="status-step ${cls}"><div class="step-icon">${icons[s]}</div><div class="step-label">${labels[s]}</div></div>`;
          }).join('')}
        </div>` : `<div class="badge badge-cancelled" style="margin-top:12px;">❌ This order was cancelled</div>`}

        <!-- Expandable Detail -->
        <div class="order-detail" id="detail-${o.id}">
          <div style="font-weight:600;margin-bottom:10px;">Items</div>
          <div id="items-${o.id}"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:8px 0;"></div></div>
          <hr class="divider" style="margin:12px 0;"/>
          <div class="flex-between">
            <span style="color:var(--gray-2);">Delivery fee</span>
            <span style="font-size:0.85rem;">₹${parseFloat(o.delivery_fee||30).toFixed(0)}</span>
          </div>
          <div class="flex-between" style="font-weight:700;margin-top:6px;">
            <span>Order Total</span>
            <span style="color:var(--primary);">₹${parseFloat(o.total_amount).toFixed(0)}</span>
          </div>
          <hr class="divider" style="margin:12px 0;"/>
          <div class="flex-between">
            <span style="color:var(--gray-2);">Delivery Address</span>
            <span style="font-size:0.82rem;text-align:right;max-width:55%;color:var(--gray-1);">${o.delivery_address || '—'}</span>
          </div>
          ${o.special_instructions ? `<div class="flex-between" style="margin-top:8px;"><span style="color:var(--gray-2);">Note</span><span style="font-size:0.82rem;text-align:right;max-width:55%;color:var(--gray-1);">${o.special_instructions}</span></div>` : ''}
        </div>
      </div>`).join('');
  }

  async function toggleOrder(id) {
    const detail = document.getElementById('detail-' + id);
    detail.classList.toggle('open');
    if (!detail.classList.contains('open')) return;
    const itemsEl = document.getElementById('items-' + id);
    if (itemsEl.dataset.loaded) return; // already loaded — don't refetch
    try {
      const order = await API.orders.get(id);
      const items = order.items || [];
      if (!items.length) {
        itemsEl.innerHTML = '<div style="color:var(--gray-3);font-size:0.85rem;padding:4px 0;">No item details found.</div>';
      } else {
        itemsEl.innerHTML = items.map(i => `
          <div class="order-item-row">
            <span>${i.is_veg ? '🟢' : '🔴'} ${i.item_name} <span style="color:var(--gray-3);">× ${i.quantity}</span></span>
            <span style="font-weight:600;">₹${(parseFloat(i.price_at_time) * i.quantity).toFixed(0)}</span>
          </div>`).join('');
      }
      itemsEl.dataset.loaded = '1';
    } catch (err) {
      itemsEl.innerHTML = `<div style="color:var(--gray-3);font-size:0.85rem;padding:4px 0;">Could not load items — ${err.message}</div>`;
    }
  }

  function filterStatus(btn, val) {
    currentFilter = val;
    document.querySelectorAll('#status-tabs .tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderOrders();
  }

  init();
</script>
</body>
</html>
