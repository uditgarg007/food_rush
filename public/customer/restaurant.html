<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant — FoodRush</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .rest-banner { height: 280px; object-fit: cover; width: 100%; }
    .rest-header { background: white; padding: 20px 0; border-bottom: 1px solid var(--gray-5); }
    .rest-header-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .menu-sidebar { width: 180px; flex-shrink: 0; position: sticky; top: calc(var(--navbar-height) + 120px); max-height: 60vh; overflow-y: auto; }
    .menu-cat-link { display: block; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; color: var(--gray-2); cursor: pointer; transition: all var(--t); margin-bottom: 4px; }
    .menu-cat-link:hover, .menu-cat-link.active { background: rgba(226,55,68,0.08); color: var(--primary); font-weight: 600; }
    .menu-content { flex: 1; }
    .menu-cat-section { margin-bottom: 32px; }
    .menu-cat-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .page-body-rest { padding-top: var(--navbar-height); }
    .review-card { background: var(--bg); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; }
    .review-stars { color: #fc8019; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/customer/dashboard.html" class="navbar-logo"><div class="logo-icon">🍱</div>Food<span>Rush</span></a>
    <div class="navbar-right">
      <a href="/customer/orders.html" class="btn btn-ghost btn-sm">📋 Orders</a>
      <button class="btn btn-ghost btn-sm" data-action="logout">Logout</button>
    </div>
  </div>
</nav>

<div class="page-body-rest">
  <!-- Loading state -->
  <div id="loading-state" style="padding:100px;text-align:center;"><div class="spinner" style="margin:auto;"></div></div>

  <!-- Restaurant Detail -->
  <div id="rest-detail" style="display:none;">
    <div style="overflow:hidden;position:relative;">
      <img id="rest-banner" class="rest-banner" src="" alt=""/>
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.6));"></div>
    </div>
    <div class="rest-header">
      <div class="rest-header-inner">
        <div class="flex-between flex-wrap" style="gap:12px;">
          <div>
            <h1 id="rest-name" style="font-size:1.5rem;"></h1>
            <div id="rest-cuisine" style="color:var(--gray-2);font-size:0.9rem;margin:4px 0;"></div>
            <div class="flex gap-16 mt-8" style="font-size:0.85rem;flex-wrap:wrap;">
              <span id="rest-rating" class="flex gap-8"><span class="rating-pill">⭐ 0.0</span></span>
              <span id="rest-time">⏱️ — min</span>
              <span id="rest-fee">🛵 ₹— delivery</span>
              <span id="rest-min">Min ₹—</span>
              <span id="rest-status"></span>
            </div>
            <div id="rest-address" style="color:var(--gray-3);font-size:0.82rem;margin-top:8px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Menu + Cart layout -->
    <div class="container" style="padding-top:24px;padding-bottom:120px;">
      <div style="display:flex;gap:32px;align-items:flex-start;">
        <!-- Category sidebar -->
        <div class="menu-sidebar" id="cat-sidebar"></div>

        <!-- Menu items -->
        <div class="menu-content" id="menu-container">
          <div class="empty-state"><div class="empty-icon">🍽️</div><h3>Loading menu…</h3></div>
        </div>
      </div>

      <!-- Reviews Section -->
      <div style="margin-top:48px;">
        <div class="flex-between mb-16">
          <h2 style="font-size:1.2rem;">Reviews</h2>
          <button class="btn btn-outline btn-sm" id="write-review-btn">Write a Review</button>
        </div>
        <div id="reviews-container">
          <div style="text-align:center;padding:24px;color:var(--gray-3);">Loading reviews…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Cart Bubble -->
<div class="cart-bubble hidden" id="cart-bubble" onclick="window.location='/customer/cart.html'">
  <div class="bubble-count" id="bubble-count">0</div>
  <span>View Cart</span>
  <span id="bubble-total" style="font-size:0.85rem;opacity:0.9;"></span>
</div>

<!-- Review Modal -->
<div class="modal-overlay hidden" id="review-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Write a Review</h3>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Rating</label>
        <div id="star-rating" style="display:flex;gap:4px;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Comment</label>
        <textarea id="review-comment" class="form-control" placeholder="Share your experience…" rows="4"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="submitReview()">Submit Review</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  let restId, restaurantData;
  let getRating;

  async function init() {
    await requireAuth(['customer']);
    const params = new URLSearchParams(window.location.search);
    restId = params.get('id');
    if (!restId) { window.location.href = '/customer/dashboard.html'; return; }

    try {
      const { restaurant, menu } = await API.restaurants.get(restId);
      restaurantData = restaurant;
      renderRestaurant(restaurant, menu);
      loadReviews();
      updateCartBubble();
    } catch (err) {
      document.getElementById('loading-state').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }

  function renderRestaurant(r, menu) {
    document.title = r.name + ' — FoodRush';
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('rest-detail').style.display   = '';
    document.getElementById('rest-banner').src  = r.image_url || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200';
    document.getElementById('rest-name').textContent = r.name;
    document.getElementById('rest-cuisine').textContent = r.cuisine_type || '';
    document.getElementById('rest-rating').innerHTML = `<span class="rating-pill">⭐ ${parseFloat(r.rating||0).toFixed(1)}</span> <span style="color:var(--gray-3);font-size:0.82rem;">${r.review_count} reviews</span>`;
    document.getElementById('rest-time').textContent = `⏱️ ${r.delivery_time} min`;
    document.getElementById('rest-fee').textContent  = `🛵 ₹${parseFloat(r.delivery_fee).toFixed(0)} delivery`;
    document.getElementById('rest-min').textContent  = r.min_order > 0 ? `Min ₹${parseFloat(r.min_order).toFixed(0)}` : '';
    document.getElementById('rest-status').innerHTML = r.is_open
      ? '<span class="badge badge-ready">● Open</span>'
      : '<span class="badge badge-cancelled">● Closed</span>';
    document.getElementById('rest-address').textContent = r.address || '';

    const cats = Object.keys(menu);
    const sidebar = document.getElementById('cat-sidebar');
    sidebar.innerHTML = cats.map(cat => `<a class="menu-cat-link" href="#cat-${slug(cat)}">${menu[cat].icon} ${cat}</a>`).join('');

    const container = document.getElementById('menu-container');
    if (!cats.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🍽️</div><h3>Menu coming soon</h3></div>';
      return;
    }
    container.innerHTML = cats.map(cat => `
      <div class="menu-cat-section" id="cat-${slug(cat)}">
        <div class="menu-cat-title">${menu[cat].icon} ${cat}</div>
        ${menu[cat].items.map(item => `
          <div class="menu-item-card mb-12" style="${!item.is_available ? 'opacity:0.5;' : ''}">
            <div class="menu-item-info">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <div class="veg-indicator ${item.is_veg ? 'veg' : 'non-veg'}"></div>
                <div class="menu-item-name" style="font-weight:600;">${item.name}</div>
              </div>
              <div style="font-size:0.82rem;color:var(--gray-3);margin-bottom:8px;">${item.description || ''}</div>
              <div class="flex-between">
                <div class="menu-item-price">₹${parseFloat(item.price).toFixed(0)}</div>
                ${item.is_available && r.is_open
                  ? `<button class="btn btn-outline btn-sm" onclick="addToCart(${item.id},'${escStr(item.name)}',${item.price},${item.is_veg},'${escStr(item.image_url||'')}')">+ Add</button>`
                  : `<span style="font-size:0.78rem;color:var(--gray-3);">${!r.is_open ? 'Restaurant closed' : 'Unavailable'}</span>`}
              </div>
            </div>
            ${item.image_url ? `<img class="menu-item-img" src="${item.image_url}" alt="${item.name}" loading="lazy"/>` : ''}
          </div>`).join('')}
      </div>`).join('');

    // Intersection observer for sidebar highlight
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id;
          document.querySelectorAll('.menu-cat-link').forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#'+id));
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.menu-cat-section').forEach(s => observer.observe(s));
  }

  function addToCart(id, name, price, isVeg, img) {
    const added = Cart.add(parseInt(restId), restaurantData.name, { id, name, price, is_veg: isVeg, image_url: img });
    if (added) { toast(`${name} added to cart ✨`, 'success', 1500); updateCartBubble(); }
  }

  function updateCartBubble() {
    const count = Cart.count(), total = Cart.total();
    const bubble = document.getElementById('cart-bubble');
    if (count > 0) {
      bubble.classList.remove('hidden');
      document.getElementById('bubble-count').textContent = count;
      document.getElementById('bubble-total').textContent  = '₹' + total.toFixed(0);
    } else {
      bubble.classList.add('hidden');
    }
  }

  async function loadReviews() {
    try {
      const reviews = await API.reviews.list(restId);
      const container = document.getElementById('reviews-container');
      if (!reviews.length) { container.innerHTML = '<div style="color:var(--gray-3);padding:16px;">No reviews yet — be the first!</div>'; return; }
      container.innerHTML = reviews.map(rv => `
        <div class="review-card">
          <div class="flex-between">
            <div style="font-weight:600;">${rv.customer_name}</div>
            <span class="review-stars">${ratingStars(rv.rating)} <span style="color:var(--gray-3);font-size:0.8rem;">${timeAgo(rv.created_at)}</span></span>
          </div>
          ${rv.comment ? `<p style="margin-top:8px;font-size:0.9rem;">${rv.comment}</p>` : ''}
        </div>`).join('');
    } catch {}
  }

  document.getElementById('write-review-btn').addEventListener('click', () => {
    document.getElementById('review-modal').classList.remove('hidden');
    getRating = initStarRating('star-rating');
  });

  function closeReviewModal() { document.getElementById('review-modal').classList.add('hidden'); }

  async function submitReview() {
    const rating = document.getElementById('star-rating').dataset.value;
    const comment = document.getElementById('review-comment').value.trim();
    if (!rating || rating == 0) { toast('Please select a rating', 'error'); return; }
    try {
      await API.reviews.create({ restaurant_id: restId, rating: parseInt(rating), comment });
      toast('Review submitted! 🌟', 'success');
      closeReviewModal();
      loadReviews();
    } catch (err) { toast(err.message, 'error'); }
  }

  function slug(s) { return s.toLowerCase().replace(/\s+/g, '-'); }
  function escStr(s) { return (s||'').replace(/'/g, "\\'"); }

  init();
</script>
</body>
</html>
